<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-native viewport: viewport-fit=cover prevents white bars around iPhone notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FutureMe AI</title>
    <meta name="description" content="AI-powered healthspan prediction platform. Meet your future self, powered by Predictive." />
    <meta name="author" content="FutureMe AI" />

    <!-- iOS native app appearance -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FutureMe AI" />

    <!-- Android / Chrome brand color (matches our deep navy theme) -->
    <meta name="theme-color" content="#0c1222" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="FutureMe AI — Meet Your Future Self" />
    <meta property="og:description" content="AI-powered healthspan prediction and longevity planning platform." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/app-icon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FutureMe" />
    <meta name="twitter:image" content="/app-icon.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
